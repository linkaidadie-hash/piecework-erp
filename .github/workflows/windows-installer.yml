name: Build Windows Installer

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend executable
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller
          pyinstaller desktop/backend_launcher.py `
            --name sme-production-backend `
            --onefile `
            --noconsole `
            --paths backend `
            --hidden-import app.main `
            --hidden-import app.api.routes `
            --hidden-import app.core.license `
            --hidden-import passlib.handlers.bcrypt `
            --hidden-import bcrypt `
            --hidden-import sqlite3 `
            --collect-submodules passlib `
            --collect-submodules bcrypt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend static files
        shell: pwsh
        working-directory: frontend
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:18765/api
        run: |
          npm ci
          npm exec -- next build --webpack

      - name: Prepare desktop resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force desktop/resources/backend | Out-Null
          New-Item -ItemType Directory -Force desktop/resources/frontend | Out-Null
          Copy-Item dist/sme-production-backend.exe desktop/resources/backend/sme-production-backend.exe
          Copy-Item frontend/out/* desktop/resources/frontend -Recurse -Force

      - name: Build Windows installer
        shell: pwsh
        working-directory: desktop
        run: |
          npm install
          npm run dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SME-Production-System-Windows-Installer
          path: desktop/dist/*.exe

      - name: Upload installer to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
