name: secret-scan

on:
  push:
    branches: [main, 'feature/**', 'codex/**']
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded private keys
        run: |
          echo "::group::Scanning for private key markers"
          for marker in 'BEGIN PRIVATE KEY' 'BEGIN RSA PRIVATE' 'BEGIN EC PRIVATE' 'BEGIN OPENSSH PRIVATE' 'BEGIN DSA PRIVATE' 'BEGIN PGP PRIVATE'; do
            if git grep -I --all-match -n -F "$marker"; then
              echo "::error::Hardcoded private key found: $marker"
              exit 1
            fi
          done
          echo "::endgroup::"

      - name: Scan for hardcoded credentials
        run: |
          echo "::group::Scanning for credential patterns"
          for pattern in 'ghp_[A-Za-z0-9]{30,}' 'gho_[A-Za-z0-9]{30,}' 'ghs_[A-Za-z0-9]{30,}' 'sk-[A-Za-z0-9]{20,}' 'AKIA[0-9A-Z]{16}' 'AIza[0-9A-Za-z_-]{30,}'; do
            if git grep -I --all-match -n -E "$pattern"; then
              echo "::error::Possible hardcoded credential: $pattern"
              exit 1
            fi
          done
          echo "::endgroup::"

      - name: Scan for P0-2026-07-23 legacy markers
        run: |
          echo "::group::Scanning for legacy P0 markers"
          if git grep -I --all-match -F '9eEY4gJTL7pjCRwIf6DqRDn8EL6V9rD6EwemfCocOko'; then
            echo "::error::Legacy license public key found (P0 2026-07-23)"
            exit 1
          fi
          if git grep -I --all-match -F 'piecework-erp-local-installer-secret'; then
            echo "::error::Legacy hardcoded SECRET_KEY found (P0 2026-07-23)"
            exit 1
          fi
          echo "::endgroup::"
