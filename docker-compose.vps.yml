services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-piecework_erp}
      POSTGRES_USER: ${POSTGRES_USER:-piecework}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-strong-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-piecework} -d ${POSTGRES_DB:-piecework_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:18081:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-piecework}:${POSTGRES_PASSWORD:-change-strong-password}@db:5432/${POSTGRES_DB:-piecework_erp}
      SECRET_KEY: ${SECRET_KEY:-change-a-long-random-secret}
      DEFAULT_DOMAIN: ${DOMAIN:-erp.hanshuniu.top}
      LICENSE_FILE: /data/license.dat
    volumes:
      - license_data:/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: /api
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  license_data:
